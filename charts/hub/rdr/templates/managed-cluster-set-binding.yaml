{{- if .Values.byoc }}
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: {{ .Values.managedClusterSetName | default "resilient" }}
  namespace: open-cluster-management
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  clusterSet: {{ .Values.managedClusterSetName | default "resilient" }}
{{- end }}
